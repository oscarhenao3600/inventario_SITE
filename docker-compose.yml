# --- ORQUESTACIÓN DE CONTENEDORES (DOCKER COMPOSE) ---

version: '3.8'

services:
  # BASE DE DATOS (MongoDB)
  mongo:
    image: mongo:latest
    container_name: inventario_db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${DB_NAME}
    ports:
      # Ya no usamos 27017 directamente al exterior. 
      # Usamos un puerto alternativo definido en .env para Compass.
      - "${MONGO_EXTERNAL_PORT}:27017"
    volumes:
      # Persistencia de datos de la base de datos
      - mongo_data:/data/db
    networks:
      - inventario_net

  # SERVIDOR (Backend Node.js)
  server:
    build: ./server
    container_name: inventario_server
    restart: always
    environment:
      # Usamos la URI con autenticación definida en el .env
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - inventario_net

  # CLIENTE (Frontend Nginx)
  client:
    build: ./client
    container_name: inventario_client
    restart: always
    ports:
      # PUERTO DE DESPLIEGUE HTTP (PUERTO 80)
      # Formato: [Puerto_Externo_Accesible_Navegador]:[Puerto_Interno_Nginx]
      # Si quieres cambiar el puerto donde abres la web (ej: http://localhost:8080), 
      # cambia el '80' de la izquierda por '8080'.
      - "80:80"
    depends_on:
      - server
    networks:
      - inventario_net

# DEFINICIÓN DE VOLÚMENES PARA PERSISTENCIA
volumes:
  mongo_data:
  server_uploads:

# RED INTERNA
networks:
  inventario_net:
    driver: bridge
