# --- CONFIGURACIÓN DE NGINX PARA EL FRONTEND ---

server {
    # PUERTO DE DESPLIEGUE ESTÁNDAR (HTTP)
    # Si necesitas usar otro puerto externo, es mejor cambiarlo en el docker-compose.yml
    listen 80;
    server_name localhost;

    # Directorio de los archivos estáticos
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto permite que las rutas de React (SPA) funcionen correctamente
        try_files $uri $uri/ /index.html;
    }

    # PROXY PARA LA API
    # Redirige todas las peticiones que empiecen con /api hacia el contenedor del 'server'
    location /api {
        # 'server' es el nombre del servicio definido en docker-compose
        # 3001 es el puerto interno del contenedor del backend
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
